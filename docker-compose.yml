services:
  postgres:
    image: postgres:16-alpine
    container_name: collabnotes-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: collabnotes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collabnotes-network

  redis:
    image: redis:7-alpine
    container_name: collabnotes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collabnotes-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: collabnotes-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@collabnotes.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - collabnotes-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: collabnotes-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: collabnotes
      DB_USER: postgres
      DB_PASSWORD: postgres_password
      DB_SSL: false
      JWT_ACCESS_SECRET: your_access_secret_key_min_32_characters_prod
      JWT_REFRESH_SECRET: your_refresh_secret_key_min_32_characters_prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - collabnotes-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabnotes-frontend
    environment:
      VITE_API_URL: http://localhost/api
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - collabnotes-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: collabnotes-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - collabnotes-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  collabnotes-network:
    driver: bridge
